<!DOCTYPE html>
<html>
<head>
    <title>Nested Tables Example</title>
</head>
<body>

<h3>Table inside table</h3>

<table border="1" cellspacing="0" cellpadding="20" align="center">

    <!-- Row 1 -->
    <tr>
        <td>
            <!-- Small Table 1 -->
            <table border="1" cellspacing="0" cellpadding="5">
                <tr><td>1</td><td>2</td></tr>
                <tr><td>3</td><td>4</td></tr>
                <tr><td>5</td><td>6</td></tr>
            </table>
        </td>

        <td>
            <!-- Small Table 2 -->
            <table border="1" cellspacing="0" cellpadding="5">
                <tr><td>1</td><td>2</td></tr>
                <tr><td>3</td><td>4</td></tr>
                <tr><td>5</td><td>6</td></tr>
            </table>
        </td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td>
            <!-- Small Table 3 -->
            <table border="1" cellspacing="0" cellpadding="5">
                <tr><td>1</td><td>2</td></tr>
                <tr><td>3</td><td>4</td></tr>
                <tr><td>5</td><td>6</td></tr>
            </table>
        </td>

        <td>
            <!-- Small Table 4 -->
            <table border="1" cellspacing="0" cellpadding="5">
                <tr><td>1</td><td>2</td></tr>
                <tr><td>3</td><td>4</td></tr>
                <tr><td>5</td><td>6</td></tr>
            </table>
        </td>
    </tr>

</table>

</body>
</html>
