<!DOCTYPE html>
<html>
<head>
    <title>Colspan and Rowspan Table</title>
</head>
<body>

<table border="2" cellspacing="5" cellpadding="10" bgcolor="lightyellow">
    <tr bgcolor="lightblue">
        <th rowspan="2">Sr No</th>
        <th rowspan="2">Name</th>
        <th colspan="3">Marks</th>
        <th rowspan="2">Total</th>
    </tr>
    <tr bgcolor="lightgreen">
        <th>Sub1</th>
        <th>Sub2</th>
        <th>Sub3</th>
    </tr>
    <tr>
        <td>1</td>
        <td>Rahul</td>
        <td>80</td>
        <td>75</td>
        <td>85</td>
        <td>240</td>
    </tr>
    <tr>
        <td>2</td>
        <td>Priya</td>
        <td>70</td>
        <td>88</td>
        <td>92</td>
        <td>250</td>
    </tr>
    <tr>
        <td>3</td>
        <td>Amit</td>
        <td>60</td>
        <td>65</td>
        <td>70</td>
        <td>195</td>
    </tr>
</table>

</body>
</html>
