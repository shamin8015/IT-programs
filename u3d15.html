<!DOCTYPE html>
<html>
<head>
    <title>Special Characters Example</title>
</head>
<body>

<h1 align="center">Special Characters in HTML</h1>

<p>Yen Symbol: &yen;</p>
<p>Right Arrow: &rarr;</p>
<p>Left Arrow: &larr;</p>
<p>Up Arrow: &uarr;</p>
<p>Down Arrow: &darr;</p>

<p>Copyright Symbol: &copy;</p>
<p>Registered Trademark: &reg;</p>
<p>Trademark: &trade;</p>

<p>Euro Symbol: &euro;</p>
<p>Pound Symbol: &pound;</p>

<p>Less than: &lt;</p>
<p>Greater than: &gt;</p>
<p>Ampersand: &amp;</p>

<p>Non-breaking space example: Hello&nbsp;&nbsp;&nbsp;World!</p>

</body>
</html>
