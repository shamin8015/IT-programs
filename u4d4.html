<!--Write a program to display use of different selectors in CSS.-->
<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors Example</title>
    <style>
        h1 {
            color: blue;
        }
        .highlight {
            color: red;
            font-weight: bold;
        }
        #special {
            color: green;
            font-style: italic;
        }
        h2, p {
            color: purple;
        }
    </style>
</head>
<body>
    <h1>This is styled using an element selector (h1).</h1>
    <h2>This is styled using a group selector (h2, p).</h2>
    <p>This paragraph is styled using a group selector (h2, p).</p>
    <p class="highlight">This paragraph uses a class selector (.highlight).</p>
    <p id="special">This paragraph uses an ID selector (#special).</p>
</body>
</html>
