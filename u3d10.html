<!DOCTYPE html>
<html>
<head>
    <title>House Layout Table</title>
</head>
<body>


<table border="1" cellspacing="0" cellpadding="10" width="600">

    <!-- Top Row -->
    <tr>
        <th colspan="2" bgcolor="#9ACD32">In</th>
        <th bgcolor="#D3D3D3">Entry</th>
        <th bgcolor="#000000" style="color:white;">Parking</th>
    </tr>

    <!-- Row 1 -->
    <tr>
        <td rowspan="2" bgcolor="#A52A2A" style="color:white;">Gym</td>
        <td bgcolor="yellow">Library Room</td>
        <td rowspan="5" bgcolor="#FFC000" align="center">Home</td>
        <td rowspan="2" bgcolor="#B0E0E6">Balcony</td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td bgcolor="yellow">Computer Room</td>
    </tr>

    <!-- Row 3 -->
    <tr>
        <td bgcolor="#808080">Music Room</td>
        <td bgcolor="#C0C0C0">Dance Floor</td>
        <td bgcolor="#00FF00">Drawing Room</td>
    </tr>

    <!-- Row 4 -->
    <tr>
        <td colspan="2" bgcolor="#00BFFF" align="center">Bedroom</td>
        <td>
            <table border="1" width="100%" cellspacing="0" cellpadding="5">
                <tr>
                    <td bgcolor="#FFA500">Dining Area</td>
                    <td bgcolor="#FFD700">Kitchen</td>
                </tr>
            </table>
        </td>
    </tr>

    <!-- Row 5 -->
    <tr>
        <td bgcolor="#FF69B4">Master Bedroom</td>
        <td bgcolor="#FF1493">Wash Area</td>
        <td bgcolor="#6A5ACD" style="color:white;" align="center">Play Room<br>Store Room</td>
    </tr>

    <!-- Bottom Row -->
    <tr>
        <td colspan="3" bgcolor="#D3D3D3" align="center">Exit</td>
        <td bgcolor="red" style="color:white;" align="center">Out</td>
    </tr>

</table>

</body>
</html>
