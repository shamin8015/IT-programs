<!--Write a program to change fonts and style of fonts using CSS.-->
<!DOCTYPE html>
<html>
<head>
  <title>Simple Font Example</title>
  <style>
    h1 {
      font-family: Arial, sans-serif;  
      font-style: italic;              
      font-weight: bold;               
      color: darkblue;                
    }
    p {
      font-family: "Times New Roman", serif;
      font-style: normal;
      font-weight: lighter;
      color: green;
    }
  </style>
</head>
<body>
  <h1>This is a heading with Arial Italic Bold</h1>
  <p>This is a paragraph with Times New Roman Light</p>
</body>
</html>
