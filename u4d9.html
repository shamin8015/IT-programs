<!--Write a program to create Navigation bar using CSS.-->
<!DOCTYPE html>
<html>
<head>
  <title>Navigation Bar Example</title>
  <style>
    .navbar {
      background-color: #333;   /* Dark background */
      overflow: hidden;         /* Clear floats */
    }
    .navbar a {
      float: left;              /* Align links side by side */
      display: block;
      color: white;             /* Text color */
      text-align: center;
      padding: 14px 20px;       /* Spacing */
      text-decoration: none;    /* Remove underline */
    }
    .navbar a:hover {
      background-color: #ddd;   /* Light background */
      color: black;             /* Dark text */
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#contact">Contact</a>
  </div>
  <h2>Navigation Bar Demo</h2>
  <p>Click the links above to navigate.</p>
</body>
</html>
