<!DOCTYPE html>
<html>
<head>
    <title>Table with Caption</title>
</head>
<body>

<table border="1" cellspacing="5" cellpadding="10">
    <caption>This is a caption</caption>
    <tr>
        <td>row 1, column 1</td>
        <td>row 1, column 2</td>
    </tr>
    <tr>
        <td>row 2, column 1</td>
        <td>row 2, column 2</td>
    </tr>
</table>

</body>
</html>
