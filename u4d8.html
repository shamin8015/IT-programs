<!--Write a program to change the color of hyperlink using CSS.-->
<!DOCTYPE html>
<html>
<head>
  <title>Hyperlink Color Example</title>
  <style>
    a:link {
      color: blue;
    }
    a:visited {
      color: purple;
    }
    a:hover {
      color: red;
    }
    a:active {
      color: orange;
    }
  </style>
</head>
<body>
  <h2>Hyperlink Color Demo</h2>
  <p>
    Visit <a href="https://student.marwadiuniversity.ac.in:553/Dashboard.aspx">Website</a> to see the link colors change.
  </p>
</body>
</html>
