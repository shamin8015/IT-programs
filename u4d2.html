<!--Write a text with color in HTML page using Internal CSS.-->
<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Example</title>
    <style>
        h1 {
            color: blue;
        }
        p {
            color: green;
        }
    </style>
</head>
<body>
    <h1>Hello, this is a blue heading!</h1>
    <p>This paragraph is styled with green text using internal CSS.</p>
</body>
</html>
