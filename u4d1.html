<!--Write a text with color in HTML page using Inline CSS.-->
<!DOCTYPE html>
<html>
<head>
    <title>Inline CSS Example</title>
</head>
<body>
    <h1 style="color: blue;">Hello, this is a blue heading!</h1>
    <p style="color: green;">This paragraph is styled with green text using inline CSS.</p>
    <p style="color: red;">And this one is red.</p>
</body>
</html>
